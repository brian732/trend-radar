<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trend Radar — Sports</title>
<script src="config.js"></script>
<style>
:root{
  --bg:#0b0e14; --card:#141926; --card2:#1a2133; --border:#232c42;
  --text:#e8ecf4; --muted:#8b94ab; --accent:#4f8ef7; --green:#2fbf71;
  --amber:#f0a835; --red:#e5484d; --purple:#9d7bf5; --chip:#1e2740;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:40px}
a{color:var(--accent);text-decoration:none}
header{position:sticky;top:0;z-index:10;background:rgba(11,14,20,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 14px}
.hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:19px;letter-spacing:.3px}
h1 span{color:var(--accent)}
.fresh{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-left:auto}
.dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
.dot.green{background:var(--green)} .dot.amber{background:var(--amber)} .dot.red{background:var(--red)}
#staleBanner{display:none;background:#3a1d20;border:1px solid var(--red);color:#ffb4b6;border-radius:8px;padding:8px 12px;margin:10px 14px 0;font-size:13px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 14px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--chip);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:5px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toolbar{display:flex;align-items:center;gap:10px;padding:8px 14px;font-size:13px;color:var(--muted)}
.sortbtn{background:var(--chip);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer}
main{padding:0 14px;max-width:760px;margin:0 auto}
.section{margin-top:22px}
.sechead{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.sechead h2{font-size:16px;text-transform:uppercase;letter-spacing:1.2px}
.sechead .cnt{color:var(--muted);font-size:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.top{display:flex;align-items:flex-start;gap:10px}
.pill{flex:0 0 auto;min-width:44px;text-align:center;font-weight:700;font-size:16px;border-radius:10px;padding:7px 8px;cursor:pointer}
.pill small{display:block;font-size:9px;font-weight:400;opacity:.85}
.p-hot{background:#3a1d20;color:#ff8589;border:1px solid var(--red)}
.p-warm{background:#3a2f16;color:#ffce6b;border:1px solid var(--amber)}
.p-cool{background:#16233a;color:#7fb2ff;border:1px solid var(--accent)}
.entity{font-weight:700;font-size:16px}
.why{color:var(--text);opacity:.9;font-size:14px;margin-top:3px}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{font-size:11px;border-radius:6px;padding:2px 8px;background:var(--chip);color:var(--muted);border:1px solid var(--border)}
.badge-early{background:#241a3d;color:#c9b3ff;border:1px solid var(--purple);font-weight:600}
.badge-newx{background:#0f2b22;color:#7ee2b0;border:1px solid var(--green);font-weight:600}
.tweets{margin-top:10px;border-left:2px solid var(--border);padding-left:10px;display:flex;flex-direction:column;gap:6px}
.tw{font-size:13px;color:var(--muted)}
.tw a{color:var(--text)}
.tw .eng{color:var(--muted);font-size:12px;white-space:nowrap}
.angle{margin-top:10px;background:var(--card2);border-radius:8px;padding:8px 10px;font-size:13px}
.angle b{color:var(--amber)}
.mchip{margin-top:10px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:#12203a;border:1px solid #274672;border-radius:10px;padding:8px 10px;font-size:13px}
.mchip .odds{font-weight:700;color:#7fb2ff}
.mchip .vol{color:var(--muted);font-size:12px}
.gap{margin-top:10px;display:inline-block;border:1.5px dashed var(--border);color:var(--muted);border-radius:10px;padding:6px 10px;font-size:12.5px}
.brk{display:none;margin-top:10px;font-size:12px;color:var(--muted)}
.brk.open{display:block}
.brow{display:flex;align-items:center;gap:8px;margin-top:4px}
.brow .lbl{width:110px;flex:0 0 auto}
.bar{flex:1;height:6px;background:var(--chip);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
.brow .val{width:52px;text-align:right;flex:0 0 auto}
footer{margin:34px 14px 0;max-width:760px;margin-left:auto;margin-right:auto;padding:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
footer .src{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
footer .s{background:var(--chip);border-radius:6px;padding:3px 8px}
.empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:14px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>Trend <span>Radar</span> <small style="font-size:11px;color:var(--muted);font-weight:400">sports only</small></h1>
    <div class="fresh"><span class="dot" id="dot"></span><span id="freshTxt">loading…</span></div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="toolbar">
    <button class="sortbtn" id="sortBtn">Sort: score</button>
    <span id="counts"></span>
  </div>
</header>
<div id="staleBanner"></div>
<main id="main"><div class="empty">Loading trends…</div></main>
<footer id="foot"></footer>

<script>
"use strict";
var STALE_HOURS = 7.5;       // matches the 4x/day refresh cadence
var REFETCH_MIN = 30;        // page re-pulls data.json this often
var state = { data: null, filter: "All", sort: "score" };

function esc(s){ var d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }
function fmtN(n){ if(n>=1e6) return (n/1e6).toFixed(1)+"M"; if(n>=1e3) return (n/1e3).toFixed(1)+"K"; return String(n); }
function cents(p){ return Math.round(p*100)+"¢"; }
function hoursAgo(iso){ return (Date.now()-Date.parse(iso))/3.6e6; }
function agoTxt(iso){ var h=hoursAgo(iso); if(h<1) return Math.max(1,Math.round(h*60))+"m ago"; if(h<48) return h.toFixed(1)+"h ago"; return Math.round(h/24)+"d ago"; }

function dataUrl(){
  var repo = (window.TREND_RADAR_REPO||"");
  if(!repo || repo.indexOf("OWNER/REPO")!==-1) return "../data/data.json?ts="+Date.now(); // local preview fallback
  return "https://raw.githubusercontent.com/"+repo+"/main/data/data.json?ts="+Date.now();
}

function load(){
  fetch(dataUrl()).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
  .then(function(d){ state.data=d; render(); })
  .catch(function(e){
    document.getElementById("main").innerHTML =
      '<div class="empty">Could not load data ('+esc(e.message)+').<br><br>' +
      'If you just deployed: the first GitHub Actions run may not have finished yet, ' +
      'or site/config.js still has the placeholder repo name.</div>';
  });
}

function render(){
  var d = state.data;
  // freshness
  var h = hoursAgo(d.generated_at);
  var dot = document.getElementById("dot");
  dot.className = "dot " + (h < 5 ? "green" : h < STALE_HOURS ? "amber" : "red");
  document.getElementById("freshTxt").textContent = "updated " + agoTxt(d.generated_at);
  var sb = document.getElementById("staleBanner");
  if(h > STALE_HOURS){ sb.style.display="block"; sb.textContent="Data is "+h.toFixed(1)+"h old — the scheduled refresh may have failed. Check the repo's Actions tab."; }
  else sb.style.display="none";

  // filter chips in popularity order, with counts
  var counts = {}, total = 0;
  d.sections.forEach(function(s){ counts[s.league]=s.trends.length; total+=s.trends.length; });
  var order = (d.config && d.config.sport_order) || Object.keys(counts);
  var chips = '<button class="chip'+(state.filter==="All"?" active":"")+'" data-f="All">All ('+total+')</button>';
  order.forEach(function(lg){
    if(!counts[lg]) return;
    chips += '<button class="chip'+(state.filter===lg?" active":"")+'" data-f="'+esc(lg)+'">'+esc(lg)+' ('+counts[lg]+')</button>';
  });
  var chipEl = document.getElementById("chips");
  chipEl.innerHTML = chips;
  chipEl.querySelectorAll(".chip").forEach(function(b){
    b.onclick = function(){ state.filter=b.getAttribute("data-f"); render(); };
  });
  document.getElementById("counts").textContent = total+" trends";
  document.getElementById("sortBtn").textContent = "Sort: "+state.sort;

  // sections (already activity-ordered by the pipeline)
  var htmlOut = "";
  d.sections.forEach(function(s){
    if(state.filter!=="All" && s.league!==state.filter) return;
    var ts = s.trends.slice();
    if(state.sort==="newest") ts.sort(function(a,b){ return Date.parse(b.first_seen)-Date.parse(a.first_seen); });
    htmlOut += '<div class="section"><div class="sechead"><h2>'+esc(s.league)+'</h2><span class="cnt">'+ts.length+' trends</span></div>';
    ts.forEach(function(t){ htmlOut += card(t); });
    htmlOut += '</div>';
  });
  document.getElementById("main").innerHTML = htmlOut || '<div class="empty">No sports trends kept this cycle.</div>';
  document.querySelectorAll(".pill").forEach(function(p){
    p.onclick = function(){ var el=document.getElementById(p.getAttribute("data-brk")); if(el) el.classList.toggle("open"); };
  });

  // footer
  var ss = d.source_status||{}, f = "";
  f += '<div><b>Sources</b></div><div class="src">';
  ["x_api","trends24","google_trends","gamma_api","llm","slack"].forEach(function(k){
    if(ss[k]) f += '<span class="s">'+esc(k)+": "+esc(ss[k])+'</span>';
  });
  f += '</div>';
  if(d.x_budget) f += '<div>X post budget today: '+fmtN(d.x_budget.used_today)+' / '+fmtN(d.x_budget.cap)+'</div>';
  f += '<div style="margin-top:8px">Notes: trends24.in is a third-party mirror of X trends (ToS-gray, used as free fallback + velocity source, fail-soft). '
     + 'TikTok not covered (Creative Center API requires TikTok for Business approval). Instagram/Reels not covered (no public trend source exists). '
     + 'Market chips are suggestions only — market presence never affects what is shown as trending or how it scores.</div>';
  document.getElementById("foot").innerHTML = f;
}

function card(t){
  var cls = t.score>=70?"p-hot":t.score>=40?"p-warm":"p-cool";
  var bid = "brk_"+t.key.replace(/[^a-z0-9]/g,"_");
  var s = '<div class="card"><div class="top">';
  s += '<div class="pill '+cls+'" data-brk="'+bid+'" title="tap for score breakdown">'+t.score+'<small>score</small></div>';
  s += '<div style="min-width:0"><div class="entity">'+esc(t.entity)+'</div>';
  s += '<div class="why">'+esc(t.why_now)+'</div></div></div>';
  s += '<div class="meta"><span class="tag">'+esc(t.league)+'</span>';
  if(t.early) s += '<span class="tag badge-early">UNDER THE RADAR</span>';
  if(t.new_on_x) s += '<span class="tag badge-newx">NEW ON X</span>';
  (t.sources||[]).forEach(function(src){ s += '<span class="tag">'+esc(src)+'</span>'; });
  s += '<span class="tag">first seen '+esc(agoTxt(t.first_seen))+'</span></div>';

  if(t.example_tweets && t.example_tweets.length){
    s += '<div class="tweets">';
    t.example_tweets.forEach(function(tw){
      s += '<div class="tw"><a href="'+esc(tw.url)+'" target="_blank" rel="noopener">'
        + (tw.username?('@'+esc(tw.username)+': '):'') + esc(tw.text) + '</a> '
        + '<span class="eng">&#9829; '+fmtN(tw.likes)+' &#8645; '+fmtN(tw.retweets)+'</span></div>';
    });
    s += '</div>';
  }
  s += '<div class="angle"><b>Angle:</b> '+esc(t.angle)+'</div>';

  if(t.market){
    var odds = (t.market.outcomes||[]).slice(0,2).map(function(o){ return esc(o[0])+" "+cents(o[1]); }).join(" / ");
    s += '<a class="mchip" href="'+esc(t.market.url)+'" target="_blank" rel="noopener">'
      + '<span>&#128200; '+esc(t.market.question)+'</span>'
      + '<span class="odds">'+odds+'</span>'
      + '<span class="vol">$'+fmtN(Math.round(t.market.volume24hr))+' 24h vol</span></a>';
  } else if(t.market_gap){
    s += '<div class="gap">MARKET GAP — no matching Polymarket market (heads-up for the markets team; informational only)</div>';
  }

  var b = t.score_breakdown||{}, mx = {velocity:35,cross_platform:25,freshness:20,engagement:20,early_bonus:10};
  s += '<div class="brk" id="'+bid+'">';
  Object.keys(mx).forEach(function(k){
    var v = b[k]||0, pct = Math.min(100, v/mx[k]*100);
    s += '<div class="brow"><span class="lbl">'+k.replace("_"," ")+'</span><span class="bar"><i style="width:'+pct+'%"></i></span><span class="val">'+v+'/'+mx[k]+'</span></div>';
  });
  s += '<div style="margin-top:6px">Score = likelihood of growth next 12&ndash;24h, computed from trend signals only. Markets never affect it.</div></div>';
  s += '</div>';
  return s;
}

document.getElementById("sortBtn").onclick = function(){
  state.sort = state.sort==="score" ? "newest" : "score";
  render();
};

load();
setInterval(load, REFETCH_MIN*60*1000);
</script>
</body>
</html>
